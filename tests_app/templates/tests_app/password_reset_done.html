{% extends "tests_app/base.html" %}
{% block title %}Письмо отправлено | TestFlow{% endblock %}

{% block content %}
<style>
.reset-page {
    min-height: 72vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.reset-card {
    width: 100%;
    max-width: 560px;
    background: rgba(255,255,255,0.94);
    border: 1px solid rgba(226, 232, 240, 0.85);
    border-radius: 30px;
    padding: 40px 34px;
    box-shadow: 0 22px 60px rgba(15, 23, 42, 0.08);
    text-align: center;
}

.reset-icon {
    font-size: 3rem;
    margin-bottom: 14px;
}

.reset-title {
    font-size: 2rem;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 12px;
}

.reset-text {
    color: #64748b;
    line-height: 1.8;
    margin-bottom: 22px;
}

.reset-note {
    background: rgba(37, 99, 235, 0.08);
    color: #1e40af;
    border-radius: 16px;
    padding: 14px 16px;
    font-size: 0.96rem;
    line-height: 1.7;
}

.reset-links {
    margin-top: 22px;
}

.reset-links a {
    color: #2563eb;
    text-decoration: none;
    font-weight: 700;
}

.reset-links a:hover {
    text-decoration: underline;
}
</style>

<div class="reset-page">
    <div class="reset-card">
        <div class="reset-icon">📩</div>
        <h1 class="reset-title">Письмо отправлено</h1>
        <p class="reset-text">
            Проверьте вашу почту. Мы отправили ссылку для сброса пароля.
        </p>

        <div class="reset-note">
            Если письма нет во входящих, проверьте папку “Спам”.
        </div>

        <div class="reset-links">
            <a href="{% url 'login' %}">Вернуться ко входу</a>
        </div>
    </div>
</div>
{% endblock %}
