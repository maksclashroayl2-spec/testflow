{% extends "tests_app/base.html" %}
{% block title %}Сброс пароля | TestFlow{% endblock %}

{% block content %}
<style>
.reset-page {
    min-height: 72vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.reset-card {
    width: 100%;
    max-width: 560px;
    background: rgba(255,255,255,0.94);
    border: 1px solid rgba(226, 232, 240, 0.85);
    border-radius: 30px;
    padding: 38px 34px;
    box-shadow: 0 22px 60px rgba(15, 23, 42, 0.08);
    text-align: center;
}

.reset-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 15px;
    border-radius: 999px;
    background: rgba(37, 99, 235, 0.08);
    color: #1d4ed8;
    font-weight: 700;
    font-size: .92rem;
    margin-bottom: 18px;
}

.reset-title {
    font-size: 2.1rem;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 10px;
}

.reset-subtitle {
    color: #64748b;
    line-height: 1.75;
    margin-bottom: 26px;
}

.reset-form p {
    text-align: left;
    margin-bottom: 18px;
}

.reset-form label {
    display: block;
    font-weight: 700;
    color: #334155;
    margin-bottom: 8px;
}

.reset-form input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 16px;
    border: 1px solid #cbd5e1;
    outline: none;
    font-size: 1rem;
    transition: 0.2s ease;
    background: #fff;
}

.reset-form input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
}

.reset-btn {
    width: 100%;
    border: none;
    border-radius: 16px;
    padding: 14px 18px;
    font-weight: 700;
    font-size: 1rem;
    color: white;
    background: linear-gradient(90deg, #2563eb, #3b82f6);
    box-shadow: 0 12px 30px rgba(37, 99, 235, 0.22);
    transition: 0.2s ease;
}

.reset-btn:hover {
    transform: translateY(-1px);
}

.reset-links {
    margin-top: 18px;
    color: #64748b;
}

.reset-links a {
    color: #2563eb;
    text-decoration: none;
    font-weight: 700;
}

.reset-links a:hover {
    text-decoration: underline;
}

@media (max-width: 576px) {
    .reset-card {
        padding: 26px 20px;
        border-radius: 22px;
        margin: 0 14px;
    }

    .reset-title {
        font-size: 1.75rem;
    }
}
</style>

<div class="reset-page">
    <div class="reset-card">
        <div class="reset-badge">🔑 Восстановление доступа</div>
        <h1 class="reset-title">Сброс пароля</h1>
        <p class="reset-subtitle">
            Введите email, и мы отправим ссылку для восстановления пароля.
        </p>

        <form method="post" class="reset-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="reset-btn">Отправить ссылку</button>
        </form>

        <div class="reset-links">
            <a href="{% url 'login' %}">Вернуться ко входу</a>
        </div>
    </div>
</div>
{% endblock %}
