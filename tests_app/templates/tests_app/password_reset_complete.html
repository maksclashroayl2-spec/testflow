{% extends "tests_app/base.html" %}
{% block title %}Пароль изменён | TestFlow{% endblock %}

{% block content %}
<style>
.reset-page {
    min-height: 72vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.reset-card {
    width: 100%;
    max-width: 560px;
    background: rgba(255,255,255,0.94);
    border: 1px solid rgba(226, 232, 240, 0.85);
    border-radius: 30px;
    padding: 40px 34px;
    box-shadow: 0 22px 60px rgba(15, 23, 42, 0.08);
    text-align: center;
}

.reset-icon {
    font-size: 3rem;
    margin-bottom: 14px;
}

.reset-title {
    font-size: 2rem;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 12px;
}

.reset-text {
    color: #64748b;
    line-height: 1.8;
    margin-bottom: 24px;
}

.reset-btn {
    display: inline-block;
    border: none;
    border-radius: 16px;
    padding: 14px 24px;
    font-weight: 700;
    font-size: 1rem;
    color: white;
    text-decoration: none;
    background: linear-gradient(90deg, #2563eb, #3b82f6);
    box-shadow: 0 12px 30px rgba(37, 99, 235, 0.22);
    transition: 0.2s ease;
}

.reset-btn:hover {
    transform: translateY(-1px);
    color: white;
}
</style>

<div class="reset-page">
    <div class="reset-card">
        <div class="reset-icon">🎉</div>
        <h1 class="reset-title">Пароль успешно изменён</h1>
        <p class="reset-text">
            Теперь вы можете войти в систему с новым паролем и продолжить работу в TestFlow.
        </p>

        <a href="{% url 'login' %}" class="reset-btn">Перейти ко входу</a>
    </div>
</div>
{% endblock %}
