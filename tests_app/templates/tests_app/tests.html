<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тесты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="text-center mb-4">📘 Доступные тесты</h1>
    {% for test in tests %}
    <div class="card mb-3">
        <div class="card-body">
            <h4>{{ test.title }}</h4>
            <p>{{ test.description }}</p>
            <a href="{% url 'start_test' test.id %}" class="btn btn-primary">Пройти тест</a>
        </div>
    </div>
<div class="mb-3">
    <label class="form-label">Время на тест (в минутах):</label>
    <input type="number" name="time_limit" class="form-control" min="1" value="10" required>
</div>
    {% endfor %}
</div>
</body>
</html>
