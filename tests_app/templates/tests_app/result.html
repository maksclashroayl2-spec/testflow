<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Результаты</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="bg-white p-4 shadow rounded text-center">
    <h3 class="text-success">Тест завершён!</h3>
    <p class="mt-3">Правильных ответов: <b>{{ score }}</b> из <b>{{ total }}</b></p>
    <p>Процент: <b>{{ percent }}%</b></p>
    <h4 class="text-primary">Оценка: {{ grade }}</h4>
    <a href="/" class="btn btn-dark mt-3">На главную</a>
  </div>
</div>
</body>
</html>
