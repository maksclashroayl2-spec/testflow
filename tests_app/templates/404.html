{% extends "tests_app/base.html" %}
{% block title %}404 — Страница не найдена | TestFlow{% endblock %}

{% block content %}
<div style="max-width:600px;margin:60px auto;text-align:center;">
    <div style="font-size:6rem;font-weight:900;color:#1d4ed8;line-height:1;">404</div>
    <h1 style="margin:20px 0 12px;font-size:1.6rem;">Страница не найдена</h1>
    <p style="color:#64748b;line-height:1.7;margin-bottom:28px;">
        Запрашиваемая страница не существует или была перемещена.
        Проверьте URL-адрес или вернитесь на главную страницу.
    </p>
    <a href="{% url 'home' %}" class="btn btn-primary">На главную</a>
</div>
{% endblock %}
